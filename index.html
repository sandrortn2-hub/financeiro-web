<!DOCTYPE html>
<html lang="pt-br">

<head>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icons/icon.png">
<link rel="apple-touch-icon" href="/icons/icon.png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Controle Financeiro</title>
<meta name="theme-color" content="#00aa55">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* CORREÇÃO IPHONE */
*{
    box-sizing:border-box;
}

html{
    height:100%;
}

body{
    min-height:100vh;
    margin:0;
    padding:15px;
    background:#1e1e1e;
    color:white;
    font-family:Arial, sans-serif;
    overflow-x:hidden;
}

.sidebar{
    background:#111;
    padding:10px;
    border-radius:15px;
}

.container{
    padding:10px;
}

.card{
    background:#2a2a2a;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:white;
    color:black;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#00aa55;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
}

html, body{
    margin:0;
    padding:0;
    width:100%;
    max-width:100%;
    overflow-x:hidden;
}

@media(max-width:800px){
    .sidebar{
        position:relative;
        width:100%;
        height:auto;
    }

    .container{
        margin-left:0;
        width:100%;
        max-width:100%;
        padding:15px;
    }

    .card{
        width:100%;
        max-width:100%;
    }

    input, button{
        width:100%;
        max-width:100%;
    }
}

@media(max-width:800px){

    .sidebar{
        position:relative;
        height:auto;
        padding:8px;
    }

    .container{
        margin-left:0;
        margin-top:10px;
        padding:8px;
    }

    h1{
        font-size:34px;
    }
}

.gasto{
    background:#333;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
}

.renda{
    background:#004d2a;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
    color:#00ff88;
}

.total{
    font-size:25px;
    color:#00ff88;
}

@media(max-width:800px){

    body{
        font-size:14px;
    }

    h1{
        font-size:24px;
    }

    .card{
        padding:12px;
    }

    input{
        padding:8px;
        font-size:14px;
    }

    button{
        padding:10px;
        font-size:14px;
    }

    .total{
        font-size:20px;
    }
}

html, body{
    width:100%;
    height:100%;
    margin:0;
    padding:0;
    overflow-x:hidden;
    overflow-y:auto;
    touch-action:manipulation;
    -webkit-text-size-adjust:100%;
    background:#1e1e1e;
}

body{
    max-width:100vw;
    min-height:100vh;
}

.container{
    width:100%;
    max-width:100%;
    margin:0 auto;
    box-sizing:border-box;
}

</style>

</head>

<body>  

<div id="loginTela" class="card">

    <h2>Login Financeiro</h2>

    <input type="text" id="usuario" placeholder="Usuário">

    <input type="password" id="senha" placeholder="Senha">

    <button onclick="fazerLogin()">
        Entrar
    </button>

    <button onclick="cadastrar()">
    Criar Conta
</button>

   <button onclick="trocarSenha()">
Trocar Senha
</button>

<button onclick="limparConta()">
    Resetar Conta
</button>

</div>

<div id="appTela" style="display:none;">    

<div class="sidebar">

    <h2>Financeiro</h2>

    <button onclick="mostrarDashboard()">
    Dashboard
</button>

    <button onclick="toggleGrafico()">
    Gráfico Pizza
</button>

   <button onclick="exportarRelatorio()">
    Relatórios
</button>

    <button onclick="toggleTema()">
        Configurações
    </button>

<button onclick="iniciarVoz()">
    Comando por voz
</button>  

<button onclick="adicionarRenda()">
    Adicionar Renda
</button>

<button onclick="toggleValores()">
    👁️ Ocultar Valores
</button>

<button onclick="limparGastos()">
    Limpar Lançamentos
</button>

</div>

<div class="container">

<h1>Controle Financeiro</h1>

<div class="card">

<input type="text" id="categoria" placeholder="Categoria">

<input type="number" id="valor" placeholder="Valor">

<button onclick="adicionarGasto()">
Adicionar gasto
</button>

</div>

<div class="card">

<h2>Saldo final</h2>

<div class="total" id="total">
R$ 0
</div>

</div>

<div id="lista"></div>

<div class="card" id="cardGrafico" style="display:none;">

    <h2>Gráfico de gastos</h2>
    <canvas id="graficoBarra"></canvas>
    <canvas id="grafico"></canvas>

</div>

</div>

<script>

let gastos = JSON.parse(localStorage.getItem("gastos")) || []
let valoresOcultos = false

function adicionarGasto(){

    let categoria =
    document.getElementById("categoria").value

    let valor =
    Number(document.getElementById("valor").value)

    if(categoria === "" || valor <= 0){
        return
    }

    gastos.push({
        categoria,
        valor
    })

    localStorage.setItem(
        "gastos",
        JSON.stringify(gastos)
    )

    atualizarTela()
}

function toggleValores(){

    valoresOcultos = !valoresOcultos

    atualizarTela()
}

function atualizarTela(){

    let lista = document.getElementById("lista")
    lista.innerHTML = ""

    let total = 0
    let categorias = []
    let valores = []

    gastos.forEach((gasto, index) => {

        let nomeItem = gasto.categoria
        let valorItem = Number(gasto.valor)
        let sinal = gasto.tipo === "renda" ? "+" : "-"

        if(gasto.tipo === "renda"){
            total += valorItem
        }else{
            total -= valorItem
        }

        lista.innerHTML += `
        <div class="${gasto.tipo === "renda" ? "renda" : "gasto"}">
        ${nomeItem} - ${valoresOcultos ? "••••••" : sinal + " R$ " + valorItem.toFixed(2)}    

            <button onclick="excluirGasto(${index})">
                Excluir
            </button>
        </div>
        `

       categorias.push(nomeItem)

if(gasto.tipo === "renda"){
    valores.push(valorItem)
}else{
    valores.push(-valorItem)
} 
    })

    document.getElementById("total").innerText = valoresOcultos ? "R$ ••••••" : `R$ ${total.toFixed(2)}`

    let ctx = document.getElementById("grafico")

    if(window.meuGrafico){
        window.meuGrafico.destroy()
    }

    window.meuGrafico = new Chart(ctx, {
        type: "pie",
        data: {
            labels: categorias,
            datasets: [{
                data: valores
            }]
        }
    })

    let ctxBarra = document.getElementById("graficoBarra")

    if(window.meuGraficoBarra){
        window.meuGraficoBarra.destroy()
    }

    window.meuGraficoBarra = new Chart(ctxBarra, {
        type: "bar",
        data: {
            labels: categorias,
            datasets: [{
            label: "Rendas (+) e Gastos (-)",    
                data: valores
            }]
        }
    })
}

function excluirGasto(index){

    gastos.splice(index, 1)

    localStorage.setItem(
        "gastos",
        JSON.stringify(gastos)
    )

    atualizarTela()
}

function toggleTema(){

    if(document.body.style.background == "white"){

        document.body.style.background = "#1e1e1e"
        document.body.style.color = "white"

    }else{

        document.body.style.background = "white"
        document.body.style.color = "black"
    }

    let cards = document.querySelectorAll(".card")

    cards.forEach(card => {

        if(document.body.style.background == "white"){

            card.style.background = "#dddddd"

        }else{

            card.style.background = "#2a2a2a"
        }
    })
}

function mostrarGraficoPizza(){

    window.scrollTo({
        top: document.body.scrollHeight,
        behavior: "smooth"
    })

}


function toggleGrafico(){

    let card = document.getElementById("cardGrafico")

    if(card.style.display === "none"){
        card.style.display = "block"
    }else{
        card.style.display = "none"
    }
}

function exportarRelatorio(){

    let texto = "RELATÓRIO FINANCEIRO\n\n"

    let total = 0

    gastos.forEach(gasto => {
        texto += `${gasto.categoria} - R$ ${gasto.valor}\n`
        total += gasto.valor
    })

    texto += `\nTOTAL: R$ ${total}`

    alert(texto)
}

function iniciarVoz(){

    const SpeechRecognition =
        window.SpeechRecognition || window.webkitSpeechRecognition

    if(!SpeechRecognition){
        alert("O iPhone não liberou reconhecimento de voz neste modo. Abra pelo Safari.")
        return
    }

    const reconhecimento = new SpeechRecognition()

    reconhecimento.lang = "pt-BR"
    reconhecimento.continuous = false
    reconhecimento.interimResults = false

    reconhecimento.start()

    reconhecimento.onresult = function(event){

        let texto = event.results[0][0].transcript.toLowerCase()

        let valorTexto = texto.match(/\d+/)

        if(!valorTexto){
            alert("Não encontrei o valor")
            return
        }

        let valor = Number(valorTexto[0])

        let categoria = texto
            .replace("r$", "")
            .replace(valorTexto[0], "")
            .trim()

        if(categoria && valor){
            gastos.push({ categoria, valor })
            localStorage.setItem("gastos", JSON.stringify(gastos))
            atualizarTela()
        }
    }

    reconhecimento.onerror = function(event){
        alert("Erro no microfone: " + event.error)
    }
}

function mostrarDashboard(){

    window.scrollTo({
        top: 0,
        behavior: "smooth"
    })

}

function cadastrar(){

    let novoUsuario = prompt("Crie seu usuário:")
    let novaSenha = prompt("Crie sua senha:")

    if(!novoUsuario || !novaSenha){

        alert("Preencha usuário e senha")
        return
    }

    localStorage.setItem("usuario", novoUsuario)
    localStorage.setItem("senha", novaSenha)

    alert("Cadastro realizado com sucesso!")
}

function fazerLogin(){

    let usuario = document.getElementById("usuario").value
    let senha = document.getElementById("senha").value

    let usuarioSalvo = localStorage.getItem("usuario")
    let senhaSalva = localStorage.getItem("senha")

    if(usuarioSalvo === null || senhaSalva === null){

        alert("Crie uma conta primeiro!")
        return
    }

    if(usuario === usuarioSalvo && senha === senhaSalva){

        document.getElementById("loginTela").style.display = "none"
        document.getElementById("appTela").style.display = "block"

    }else{

        alert("Usuário ou senha incorretos")
    }
}

function trocarSenha(){

    let novaSenha = prompt("Digite a nova senha:")

    if(!novaSenha){

        alert("Digite uma senha válida")
        return
    }

    localStorage.setItem("senha", novaSenha)

    alert("Senha alterada com sucesso!")
}

function limparConta(){
    localStorage.removeItem("usuario")
    localStorage.removeItem("senha")
    alert("Conta apagada! Agora clique em Criar Conta novamente.")
}

function adicionarRenda(){

    let categoria = prompt("Nome da renda:")
    let valor = Number(prompt("Valor da renda:"))

    if(!categoria || !valor){
        alert("Preencha nome e valor da renda")
        return
    }

    gastos.push({
        categoria: categoria,
        valor: valor,
        tipo: "renda"
    })

    localStorage.setItem("gastos", JSON.stringify(gastos))

    atualizarTela()

    alert("Renda adicionada com sucesso!")
}

function limparGastos(){
    localStorage.removeItem("gastos")
    gastos = []
    atualizarTela()
    alert("Lançamentos apagados!")
}

atualizarTela()

</script>

</body>
</html>
